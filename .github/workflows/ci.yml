# .github/workflows/ci.yml
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    name: 변경 범위 판별
    runs-on: ubuntu-latest
    outputs:
      integration_e2e: ${{ steps.filter.outputs.integration_e2e }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            diff_mode="triple-dot"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            diff_mode="two-dot"
          fi

          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            git diff-tree --no-commit-id --name-only -r --root "$head" > changed-files.txt
          elif [ "$diff_mode" = "triple-dot" ]; then
            git diff --name-only "$base...$head" > changed-files.txt
          else
            git diff --name-only "$base" "$head" > changed-files.txt
          fi

          echo "Changed files:"
          cat changed-files.txt

          trigger_pattern='^(src/|tests/|supabase/|public/|workers/|package\.json$|pnpm-lock\.yaml$|tsconfig[^/]*\.json$|next\.config\.(js|mjs|ts)$|vitest\.config\.(js|mjs|ts)$|playwright\.config\.(js|mjs|ts)$|drizzle\.config\.(js|mjs|ts)$|postcss\.config\.(js|mjs|ts)$|tailwind\.config\.(js|mjs|ts)$|eslint\.config\.(js|mjs|ts)$|sentry\.(server|edge)\.config\.(js|ts)$|instrumentation\.(js|ts)$|scripts/setup-test-db\.sh$|\.github/workflows/ci\.yml$)'
          if grep -Eq "$trigger_pattern" changed-files.txt; then
            echo "integration_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "integration_e2e=false" >> "$GITHUB_OUTPUT"
          fi

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 공급망 위생 게이트: high/critical 신규 취약점이 들어오면 CI 를 막는다.
      # 잔존 항목은 모두 우리가 직접 버전을 올릴 수 없는 상위 패키지의 transitive
      # 의존성(상위 릴리스 대기 중)이라 GHSA id 단위로 allowlist 한다.
      # pnpm 8 의 audit 은 package.json auditConfig.ignoreGhsas 를 적용하지 않으므로
      # json 출력을 직접 필터링한다. allowlist 에 없는 high/critical 이 1건이라도
      # 남으면 게이트가 실패한다.
      #
      # audit 의 exit 1 은 두 가지를 모두 의미한다: (a) 취약점 발견(예상된 실패)과
      # (b) 레지스트리 도달 실패(ECONNREFUSED/타임아웃/rate limit 등 비정상 실패).
      # `|| true` 로 (a) 를 흡수하되, (b) 의 error JSON 을 정상 보고서로 오인해
      # vacuous PASS 가 되지 않도록 평가는 .github/audit-gate.ts 로 위임한다. 이
      # 평가기는 보고서에 error 키가 있거나 advisories·metadata.vulnerabilities 가
      # 빠져 있으면 fail-closed(exit 1) 한다(tests/unit/ci/audit-gate.test.ts 로 검증).
      #
      # 참고(설계 부수효과): protobufjs 7.x 라인 보존(@grpc/proto-loader 경유)으로
      # GHSA-jggg-4jg4-v7c6 moderate 1건이 7.5.7 에 잔존한다. moderate 라
      # --audit-level=high 게이트에 걸리지 않으며, 상위가 protobufjs 7.5.8+/8.x 로
      # 올라오면 해소된다.
      - name: 공급망 보안 감사 게이트
        env:
          # 잔존 unfixable transitive high 취약점 allowlist (패키지 / 경유 상위 의존성)
          # minimatch ReDoS: @sentry/nextjs · eslint toolchain · exceljs
          # flatted DoS: eslint toolchain
          # @grpc/grpc-js: inngest
          # serialize-javascript RCE / rollup / fast-uri: @sentry/nextjs
          # picomatch / vite / esbuild: vite·vitest·@tailwindcss/vite·@sentry/nextjs (dev toolchain)
          # tmp: exceljs
          # lodash: recharts · @tremor/react
          AUDIT_ALLOWLIST: >-
            GHSA-23c5-xmqv-rm74 GHSA-25h7-pfq9-p65f GHSA-3ppc-4f35-3m26
            GHSA-5375-pq7m-f5r2 GHSA-5c6j-r48x-rmvq GHSA-7r86-cg39-jmmj
            GHSA-99f4-grh7-6pcq GHSA-c2c7-rcm5-vvqj GHSA-gv7w-rqvm-qjhr
            GHSA-mw96-cpmx-2vgc GHSA-p9ff-h696-f583 GHSA-ph9p-34f9-6g65
            GHSA-q3j6-qgpj-74h6 GHSA-r5fr-rjxr-66jc GHSA-rf6f-7fwh-wjgh
            GHSA-v2wj-q39q-566r GHSA-v39h-62p7-jpjc
        run: |
          pnpm audit --audit-level=high --json > audit-report.json || true
          pnpm exec tsx .github/audit-gate.ts audit-report.json
      # RLS 하드닝 게이트: 신규 public 테이블이 ENABLE ROW LEVEL SECURITY 없이 추가되거나
      # PII 테이블(contact_targets·contact_pii)에 anon/authenticated GRANT 가 재도입되면 막는다.
      # 운영 DB 라이브 쿼리는 자격증명이 없어 불가하므로 마이그레이션 SQL 을 정적 분석한다.
      - name: RLS 하드닝 게이트
        run: pnpm exec tsx .github/rls-gate.ts supabase/migrations
      # 마이그레이션 추적 드리프트 게이트: 모든 .sql 파일이 _journal.json(db:migrate) 또는
      # manual-migrations.json(MCP 수동 적용)으로 추적되는지 검사한다. 어디에도 없는 파일은
      # 재해복구 시 누락되는 silent drift 이므로 막는다(docs/runbooks/disaster-recovery.md).
      - name: 마이그레이션 추적 드리프트 게이트
        run: pnpm exec tsx .github/migration-journal-gate.ts supabase/migrations
      - run: pnpm lint
      - run: pnpm exec tsc --noEmit
      - run: pnpm test

  e2e:
    needs: [verify, changes]
    if: needs.changes.outputs.integration_e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm db:setup-test
      - name: Export local Supabase test env
        shell: bash
        run: |
          set -euo pipefail
          STATUS_ENV="$(supabase status -o env)"
          SUPABASE_URL="$(printf '%s\n' "$STATUS_ENV" | awk -F= '/^(API_URL|SUPABASE_URL)=/{ print $2; exit }')"
          SUPABASE_KEY="$(printf '%s\n' "$STATUS_ENV" | awk -F= '/^(ANON_KEY|SUPABASE_ANON_KEY|PUBLISHABLE_KEY|SUPABASE_PUBLISHABLE_KEY)=/{ print $2; exit }')"
          if [ -z "$SUPABASE_URL" ]; then
            SUPABASE_URL="http://127.0.0.1:54321"
          fi
          if [ -z "$SUPABASE_KEY" ]; then
            echo "ERROR: Supabase local publishable/anon key not found in status output." >&2
            exit 1
          fi
          echo "::add-mask::$SUPABASE_KEY"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_KEY"
          } >> "$GITHUB_ENV"
      - name: Run integration (real DB)
        run: pnpm test:integration
      - run: pnpm exec playwright install --with-deps chromium
      - name: Validate e2e secret env
        env:
          CONTACT_PII_AES_KEY: ${{ secrets.CONTACT_PII_AES_KEY }}
          CONTACT_PII_HMAC_KEY: ${{ secrets.CONTACT_PII_HMAC_KEY }}
          DUPLICATE_DETECTION_SALT: ${{ secrets.DUPLICATE_DETECTION_SALT }}
        run: |
          node <<'NODE'
          const requiredBase64Keys = ['CONTACT_PII_AES_KEY', 'CONTACT_PII_HMAC_KEY'];
          for (const name of requiredBase64Keys) {
            const raw = process.env[name];
            if (!raw) throw new Error(`${name} GitHub Secret is required`);
            const decoded = Buffer.from(raw, 'base64');
            if (decoded.length !== 32) {
              throw new Error(`${name} must decode to 32 bytes`);
            }
          }
          if (!process.env.DUPLICATE_DETECTION_SALT) {
            throw new Error('DUPLICATE_DETECTION_SALT GitHub Secret is required');
          }
          NODE
      - name: Run e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          CONTACT_PII_AES_KEY: ${{ secrets.CONTACT_PII_AES_KEY }}
          CONTACT_PII_HMAC_KEY: ${{ secrets.CONTACT_PII_HMAC_KEY }}
          DUPLICATE_DETECTION_SALT: ${{ secrets.DUPLICATE_DETECTION_SALT }}
        run: pnpm test:e2e
